---
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.26'

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'

  format:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go vet ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # v8 is the first action line that installs golangci-lint v2. The v6
      # action pins v1.x, which cannot parse a `version: "2"` config and
      # refuses to target a module newer than the Go it was built with.
      #
      # The version is pinned rather than tracking latest so a new golangci
      # release cannot break CI on an unrelated pull request.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # -race matters here: the agent will poll and swap concurrently with
      # puppetserver invoking code-id, so data races are a live risk as the
      # codebase grows.
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Report coverage
        run: go tool cover -func=coverage.out | tail -1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # arm64 is not optional: Parallels VMs and Docker on Apple silicon
          # are both aarch64, so this is the primary local test target.
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -o codavox-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/codavox

      - uses: actions/upload-artifact@v4
        with:
          name: codavox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: codavox-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7
