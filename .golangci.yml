---
version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    # Both commands run as short-lived processes handling untrusted input from
    # puppetserver, so file-handling and traversal findings matter here.
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    revive:
      rules:
        - name: exported
          severity: warning

  exclusions:
    rules:
      # Test fixtures deliberately construct traversal paths and world-readable
      # files; those are the conditions under test, not defects.
      - path: _test\.go
        linters:
          - gosec
